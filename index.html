<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NXTLVL prod</title>
    <meta name="description" content="Next Level Production — Professional ad shoots & promo content for ambitious brands." />
    <!-- SF Pro или Jost, если нужно -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;700&display=swap" rel="stylesheet">
    <!-- Основные стили Vite/React -->
    <link rel="stylesheet" href="/assets/index-xxxxx.css" />
    <!-- Vite вставит правильный путь при сборке (или используй %PUBLIC_URL% если Create React App) -->
  </head>
  <body>
    <div id="root"></div>
    <!-- Vite/React соберёт сюда твой JS -->
    <script type="module" src="/assets/index-xxxxx.js"></script>
    <!-- Патч для SPA-роутинга при редиректе с 404.html -->
    <script>
      // SPA redirect: если пришли с 404.html — поправь адрес
      if (window.sessionStorage.getItem('redirectPath')) {
        const path = window.sessionStorage.getItem('redirectPath');
        window.sessionStorage.removeItem('redirectPath');
        if (window.location.pathname + window.location.search + window.location.hash !== path) {
          window.history.replaceState({}, '', path);
        }
      }
    </script>
  </body>
</html>
