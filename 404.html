<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>404 Not Found</title>
    <meta http-equiv="refresh" content="0; url=/" />
    <script>
      // GitHub Pages SPA redirect
      var redirect = location.pathname;
      if (redirect && redirect !== "/") {
        sessionStorage.redirect = redirect;
        location.replace("/");
      }
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
